[tool.ruff]
line-length = 110
target-version = "py312"

[tool.ruff.format]

[tool.ruff.lint]
extend-select = [
    "A",   # flake8-builtins
    "B",   # flake8-bugbear
    "C",   # flake8-comprehensions
    "C90", # Complexity
    "G",   # flake8-logging-format
    "I",   # isort
    "ISC", # flake8-implicit-str-concat
    "N",   # pep8-naming
    "T10", # flake8-debugger
    "UP",  # pyupgrade
    "W",   # pycodestyle warnings
]

[tool.ruff.lint.isort]
known-local-folder = ["include"]

[tool.ty.environment]
python-version = "3.12"

[tool.ty.src]
include = [
    "dags",
    "include",
    "plugins",
    "tests",
]
